name: Run Playwright Script

on:
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install --with-deps

      # 🔥 Install virtual display
      - name: Install Xvfb
        run: sudo apt-get install -y xvfb

      # 🔥 Run script in headful mode with virtual display
      - name: Run Script (Headful)
        env:
          ADOBE_EMAIL: ${{ secrets.ADOBE_EMAIL }}
          ADOBE_PASSWORD: ${{ secrets.ADOBE_PASSWORD }}
        run: |
          xvfb-run --auto-servernum python img-up.py

      - name: Commit tk.txt
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add tk.txt
          git commit -m "Update token file" || echo "No changes"
          git push
